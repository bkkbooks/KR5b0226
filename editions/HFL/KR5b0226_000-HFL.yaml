front:
  text: 洞玄靈寳自然齋儀
  hash: sha256:8d684c6c8eaa433a6b16d57add0a8925252a6bddb33dd5bac5e17cd934c76566
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0226_HFL_000-001a, image: hfl/0293/0293-146.png}
body:
  text: 各禮師存念如法次鳴法皷二十四通次發爐無上三天玄元始三氣太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符直日香官各三十六人出關啓此間土地里域眞官正神臣今正爾燒香行道奉爲弟子某陳乞所願願得十方正眞生氣降流臣等身中令臣所啓速達徑御太上無極大道至眞玉皇上帝御前各稱名位具法職某嶽先生臣某等同誠上啓虚無自然元始天尊無極大道太上道君太上老君髙上玉皇十方巳得道大聖衆至眞諸君丈人三十二天帝玉虚上帝玉帝太帝東華南極西靈北眞玄都玉京金闕七寳玄臺紫微上宫靈寳至眞明皇道君玄中大法師三界官屬一切尊靈臣等宿命因縁生逢大化玄眞啓拔得入法門三師盟受三寳神經供養尊禮以求所願荷恩隆重喜懼交并然受法之日約當罄竭愚短自效毛髪宣通法音讃揚妙化普令一切咸入法門救生度死令衆安樂凡有投告理合申騰今有詞文謹當宣奏次讀詞具如詞言情唯丹慊仰憑至道由慮將來臣等忝荷洪慈職唯拯救伏聞虚皇布法爲萬品之津梁大帝垂文作千眞之軌躅門開接引教許依投有感即通無求不應精誠内著芝英爲之表祥靈澤下流星辰爲之列耀運兹初捻上香歸身歸神歸命十方無極大道太上三尊願以是功德歸流大道弟子某家九玄七祖前亡後化一切宗親並願俱出九幽齊登十極落北隂之玄籍上南極之丹文福慶遐臻禎祥逺集仇讎罷對慶及子孫今故燒香自歸依師尊大聖衆至眞之德得道之後昇入無形和與道合同夫玉京非逺斂念即通眞宰無方隨心必應運兹二捻上香歸身歸神歸命十方無極大道太上三尊願以是功德歸流皇帝執象化人秉圖御運人懷凱悌物遂生成次及臣等受道三師經生父母巖棲志士同學之人九姻門族天下人民蜎飛蠢動一切衆生各遂安寜悉離災横今故燒香自歸依師尊大聖衆至眞之德得道之後昇入無形和與道合同夫大道無私隨機必應至精有信待感而通運兹三捻上香歸身歸神歸命十方無極大道太上三尊願以是功德歸流齋主大道弟子某并門族親姻伏願厄患消寧身心朗徹洞金房之奥㫖超酆部之幽徒福善自彰神明匡衞生齡更逺比枯木而再榮盡命方延𩔖寒燈而重焰男女貞順畜産繁昌今故燒香自歸依師尊大聖衆至眞之德得道之後昇入無形和與道合同次禮十方懴次四聖方懴臣法衆等至心歸命十方無極太上靈寳天尊十郷神仙諸靈官但弟子某生自囂塵長多罪累淪神喪氣有僞無眞恩愛所拘聲名所誘唯深愆犯莫保安危又慮積生巳來至于今日隂罪陽過犯觸十方或不順隂陽罔知避忌殺生害命恣意極情或知而故爲或謬誤不覺或身心自構或被逼從人罪咎貫盈神明譴責宿夜憂懼不敢寧居仰憑髙尊希蒙覆育臣等洗心首過靜念祈恩爲修靈寳妙齋拔贖幽明之咎當願見存人口良賤尊卑厄難雲消算夀天永見存姻屬内外宗親神爽清夷盡沾玄慶子孫昌熾長㑹善縁福起十方禍沉九夜稽首歸依正眞三寳次左迴向西平立思九色圓像命魔宻呪次歩虚旋繞次三啓次三禮次重稱名位具法職某嶽先生臣某等同誠重上啓太上無極大道至眞靈寳三十六部尊經太上三尊十方衆聖玄中大法師三界官屬一切神靈臣等餘福所流運遇大法玄眞啓拔忝佩靈文而胎染結陋未能抗絶負越科禁丹誠莫申自宜灰心甘寘冥罰但以千眞有格許立微功輒勵管窺奉宣慈化期以拔贖用濟群生今謹有大道弟子某辭情丹慊實可哀矜生在塵途情唯昬蔽因縁所習超度無門唯保倚上玄特希洪澤臣等謹相携率沐俗身心焚香轉經以期悔謝伏惟太上衆尊監齋大法師侍眞群靈三界官屬垂神鑒映照覽所陳特開大宥之恩俯遂塵微之懇伏乞赦弟子九玄七祖下及巳身積世巳來至于今日恣情極欲廣構罪田或不了義方不明妙趣喪神耗氣恥朴好華口實心違外眞内僞隂罪陽過無量無邊或謬誤不知或知而故犯違盟破戒怠墮幽冥諸如此條不可憶識乞今燒香行道賜蒙蕩滌伏願太上髙聖大神至眞群靈垂大慈之澤致感應之靈迴救度之福降罔極之恩召飛天神人齎東華青宫九龍符命歷下十方檢校曹局凡有弟子某家存亡罪咎咸願消除受錬南宫削名北府福流玄葉吉享見存使老少咸和子孫賢貴殃災雲散善瑞日生僕𨽻安康豢養滋茂臣等謹爲齋主所首所謝咸乞如言所啓所陳事蒙原解上明天尊弘慈之澤下副臣等歸命之誠謹啓以聞次十二願次復爐香官使者左右龍虎君侍香諸靈官當令齋堂之内自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前令弟子修齋巳後舉家受福内外蒙恩十方仙童玉女侍衞香煙傳臣向來關啓徑御太上無極大道玉皇上帝御前次出堂同玄靈寳自然齋義
